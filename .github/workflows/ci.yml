name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  mcp-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        working-directory: packages/sprintroom-mcp
        run: npm ci

      - name: Typecheck
        working-directory: packages/sprintroom-mcp
        run: npx tsc --noEmit

      - name: Build
        working-directory: packages/sprintroom-mcp
        run: npm run build

      - name: Verify package
        run: |
          cd packages/sprintroom-mcp
          npm pack --dry-run
