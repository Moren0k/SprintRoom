[auth]
allowed_redirect_urls = ["https://tw5cnd8i.insforge.site/auth/callback", "https://tw5cnd8i.insforge.site/api/auth/callback", "http://localhost:3000/auth/callback", "http://localhost:3000/api/auth/callback"]
require_email_verification = true
verify_email_method = "code"
reset_password_method = "code"

[auth.password]
min_length = 6
require_number = false
require_lowercase = false
require_uppercase = false
require_special_char = false

[auth.smtp]
enabled = false
host = ""
port = 465
username = ""
sender_email = ""
sender_name = ""
min_interval_seconds = 60
